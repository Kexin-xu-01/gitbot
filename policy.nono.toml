# policy.nono.toml — nono sandbox policy for gitbot
#
# Generated via: nono learn --output policy.nono.toml -- python bot.py
# Then hardened: trimmed overly-broad paths, added explicit deny blocks.
#
# The deny blocks are as important as the allow blocks — they prove that
# gitbot cannot exfiltrate SSH or AWS credentials even if a dependency
# (Flask, PyGithub, google-generativeai) is compromised.

[filesystem]
  [filesystem.read]
  allow = [
    "/Users/kexinxu/gitbot/**",
    "/usr/local/lib/python3.*/**",   # site-packages and stdlib
    "/usr/lib/libSystem*",
    "/usr/lib/libz*",
    "/usr/lib/libssl*",
    "/usr/lib/libcrypto*",
    "/private/etc/ssl/cert.pem",     # CA bundle for TLS verification
    "/private/etc/resolv.conf",      # DNS resolution
  ]
  deny = [
    "/Users/kexinxu/.ssh/**",
    "/Users/kexinxu/.aws/**",
    "/Users/kexinxu/.gnupg/**",
    "/Users/kexinxu/.config/gcloud/**",
    "/Users/kexinxu/.kube/**",
  ]

  [filesystem.write]
  allow = [
    "/Users/kexinxu/gitbot/**",      # log files, temp files within project
    "/tmp/**",
  ]
  deny = [
    "/Users/kexinxu/.ssh/**",
    "/Users/kexinxu/.aws/**",
  ]

[network.outbound]
allow = [
  "api.github.com:443",
  "generativelanguage.googleapis.com:443",
  "nono.sh:443",
  "smee.io:443",                     # webhook forwarding in dev
  "127.0.0.1:*",                     # localhost (smee client)
]
# Everything not in the allow list is denied by default.

[credentials]
inject = [
  { name = "GITHUB_TOKEN",   keychain_item = "gitbot/github-token" },
  { name = "GEMINI_API_KEY", keychain_item = "gitbot/gemini-api-key" },
  { name = "WEBHOOK_SECRET", keychain_item = "gitbot/webhook-secret" },
]

[trust]
verify_at_startup = [
  { file = "GEMINI.md", bundle = ".nono-trust.bundle" }
]
